<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets">
<head>
    <title>TaskBoard — A Jakarta MVC Sample Application</title>

    <!-- Required meta tags -->
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Outfit:wght@400;500;600;700;800&amp;display=swap"/>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>

    <!-- Custom styles -->
    <link href="#{request.contextPath}/resources/css/main.css" rel="stylesheet"/>
    <ui:insert name="headIncludes"></ui:insert>
</head>
<body class="d-flex flex-column h-100">
<header class="header">
    <ui:include src="/WEB-INF/layout/header.xhtml"/>
</header>

<main class="flex-shrink-0">
    <div class="container">
        <ui:include src="/WEB-INF/layout/alert.xhtml"/>

        <h1 class="page-header">
            <ui:insert name="pageTitle"></ui:insert>
        </h1>

        <ui:insert name="content"/>
    </div>
</main>

<ui:include src="/WEB-INF/layout/footer.xhtml"/>

<!-- Bootstrap 5 JavaScript Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<ui:insert name="bodyIncludes"></ui:insert>
</body>
</html>
