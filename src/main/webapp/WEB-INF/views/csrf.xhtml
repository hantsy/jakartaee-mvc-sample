<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/layout/template.xhtml">
    <ui:define name="pageTitle">CSRF Demo</ui:define>
    <ui:define name="content">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 col-sm-12">
                <div class="form-card">
                    <form id="form" name="form" role="form" action="#{mvc.uri('CsrfController#post')}" method="post">
                        <input type="hidden" name="${mvc.csrf.name}" value="${mvc.csrf.token}"/>

                        <div class="form-group">
                            <label class="text-uppercase" for="greeting">Message</label>
                            <input id="greeting" name="greeting" type="text" class="form-control"
                                   placeholder="This form is CSRF-protected. Type a message..."/>
                        </div>

                        <div class="d-flex align-items-center gap-3 mt-4 pt-3 border-top">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-shield-lock"></i>Send Greeting (CSRF)
                            </button>
                            <a href="#{mvc.basePath}/tasks" class="btn btn-outline-secondary btn-lg">
                                <i class="bi bi-x-lg"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
