<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/layout/template.xhtml">
    <ui:define name="pageTitle">Something went wrong</ui:define>
    <ui:define name="content">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 col-sm-12">
                <div class="card border-0 shadow-lg overflow-hidden">
                    <div class="card-header bg-danger text-white d-flex align-items-center gap-2 py-3 px-4">
                        <i class="bi bi-exclamation-triangle-fill fs-5"></i>
                        <h3 class="h5 mb-0" style="font-family: var(--font-heading);">Error Details</h3>
                    </div>
                    <div class="card-body p-4 bg-white">
                        <p class="text-secondary mb-3">An unexpected exception was encountered. Here is the technical trace:</p>
                        <div class="bg-light p-3 rounded border font-monospace text-danger small mb-4" style="overflow-x: auto; max-height: 300px;">
                            ${error}
                        </div>

                        <div class="d-flex justify-content-start border-top pt-3">
                            <a href="#{mvc.basePath}/tasks" class="btn btn-outline-secondary">
                                <i class="bi bi-house-door"></i>Return to Homepage
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
