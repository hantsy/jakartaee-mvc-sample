<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/layout/template.xhtml">
    <ui:define name="pageTitle">Locale / i18n</ui:define>
    <ui:define name="content">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-md-12">
                <div class="detail-card">
                    <div class="detail-row">
                        <div class="detail-label">
                            <i class="bi bi-globe2" style="color: var(--primary);"></i>Current Locale
                        </div>
                        <div class="detail-value fw-semibold" style="font-family: var(--font-heading); font-size: 1.1rem;">
                            ${locale}
                        </div>
                    </div>

                    <div class="detail-row">
                        <div class="detail-label">
                            <i class="bi bi-translate" style="color: var(--primary);"></i>Greeting Message
                        </div>
                        <div class="detail-value">
                            #{msg.get('greeting')}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
