<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                template="/WEB-INF/layout/template.xhtml">
    <ui:define name="pageTitle">Task Details</ui:define>
    <ui:define name="content">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-md-12">
                <div class="detail-card">
                    <div class="d-flex align-items-center justify-content-between mb-4 border-bottom pb-3">
                        <h2 class="h3 mb-0" style="font-family: var(--font-heading); color: var(--text-main);">
                            Task ##{details.id}
                        </h2>
                        <span class="status-badge #{details.status.toString().toLowerCase()}">
                            <i class="bi #{details.status.toString() == 'TODO' ? 'bi-list-task' : (details.status.toString() == 'DOING' ? 'bi-hourglass-split' : 'bi-check2-square')}"></i>
                            ${details.status}
                        </span>
                    </div>

                    <div class="detail-row">
                        <div class="detail-label">
                            <i class="bi bi-type" style="color: var(--primary);"></i>Task Name
                        </div>
                        <div class="detail-value fw-semibold" style="font-family: var(--font-heading); font-size: 1.1rem;">
                            ${details.name}
                        </div>
                    </div>

                    <div class="detail-row">
                        <div class="detail-label">
                            <i class="bi bi-justify-left" style="color: var(--primary);"></i>Description
                        </div>
                        <div class="detail-value text-muted">
                            ${details.description}
                        </div>
                    </div>

                    <div class="detail-row">
                        <div class="detail-label">
                            <i class="bi bi-calendar-plus" style="color: var(--primary);"></i>Created Date
                        </div>
                        <div class="detail-value">
                            <h:outputText value="${details.createdDate}">
                                <f:convertDateTime type="localDateTime" pattern="yyyy-MM-dd HH:mm"/>
                            </h:outputText>
                        </div>
                    </div>

                    <div class="detail-row">
                        <div class="detail-label">
                            <i class="bi bi-calendar-event" style="color: var(--primary);"></i>Last Modified
                        </div>
                        <div class="detail-value">
                            <h:outputText value="${details.lastModifiedDate}">
                                <f:convertDateTime type="localDateTime" pattern="yyyy-MM-dd HH:mm"/>
                            </h:outputText>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-5 pt-3 border-top gap-3">
                        <a href="#{mvc.basePath}/tasks" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i>Back to Task List
                        </a>
                        <a href="#{mvc.basePath}/tasks/#{details.id}/edit" class="btn btn-primary">
                            <i class="bi bi-pencil"></i>Edit Task
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
